services:
  db:
    image: postgres:16-alpine
    container_name: todo-db-postgres-dev
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    ports:
      - "5436:5432"

    volumes:
          - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: