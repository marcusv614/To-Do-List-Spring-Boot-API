services:
  db:
    image: postgres:16-alpine
    container_name: todolist-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: todolist
      POSTGRES_USER: todolist
      POSTGRES_PASSWORD: todolist
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todolist -d todolist"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/todolistapi
      dockerfile: Dockerfile
    container_name: todolist-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/todolist
      SPRING_DATASOURCE_USERNAME: todolist
      SPRING_DATASOURCE_PASSWORD: todolist
    ports:
      - "8080:8080"

volumes:
  postgres_data:
